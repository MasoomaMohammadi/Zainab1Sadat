<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies - Movie Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
        box-sizing: border-box;
      }
      header {
        background-color: #2a2d34;
        color: #d4af37;
        text-align: start;
        padding: 12px;
      }
      header a:hover {
        background-color: #d4af37;
        color: #2a2d34;
        padding: 4px 6px;
        border-radius: 5px;
      }
      footer {
        background-color: #2a2d34;
        color: #d4af37;
        text-align: center;
        padding: 12px;
      }
      header a,
      footer a {
        color: #d4af37;
        text-decoration: none;
        margin: 0 10px;
        font-weight: bold;
      }
      .content {
        margin: auto auto 40px 30px;
      }

      .content h1 {
        text-align: center;
        font-size: 40px;
        color: #d4af37;
        margin-top: 50px;
      }
      .movie-list {
        display: grid;
        grid-template-columns: auto auto auto;
        gap: 14px;
      }

      video {
        width: 400px;
        height: 400px;
      }
      svg {
        width: 24px;
        height: 24px;
      }

      .like {
        color: black;
      }
      .commend {
        color: black;
      }
      /* responsive */
      @media (max-width: 1024px) {
        .movie-list {
          display: grid;
          grid-template-columns: auto auto auto;
          gap: 14px;
        }
        video {
          width: 300px;
          height: 300px;
        }
      }

      @media (max-width: 925) {
        .movie-list {
          display: grid;
          grid-template-columns: auto auto auto;
          gap: 5px;
        }
      }

      @media (max-width: 858px) {
        .movie-list {
          display: grid;
          grid-template-columns: auto auto;
          gap: 14px;
        }
      }
      @media (max-width: 425px) {
        .movie-list {
          display: grid;
          grid-template-columns: auto;
        }
            video {
          width: 400px;
          height: 400px;
        }
      }
    </style>
  </head>
